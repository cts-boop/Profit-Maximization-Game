<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公開大屏幕 — 奶茶大亨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { overflow: hidden; background: var(--bg-dark); }

    /* ── Join Screen ── */
    #joinScreen {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
    }

    /* ── Screens (full-viewport) ── */
    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem;
      transition: opacity 0.5s;
    }
    .screen.screen-scroll {
      justify-content: flex-start;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .screen.hidden { display: none; }

    /* ── In-Progress Screen ── */
    #screenProgress {
      background: radial-gradient(ellipse at center, #1a1a3e 0%, var(--bg-dark) 70%);
    }

    .progress-top {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 2rem;
      background: rgba(0,0,0,0.4);
      border-bottom: 1px solid var(--border);
      font-size: 1rem;
    }

    .big-round-label {
      font-size: 1.4rem; font-weight: 700; color: var(--text-dim);
      margin-bottom: 0.5rem;
    }

    .team-lights {
      display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center;
      margin-top: 2rem;
    }

    .team-light {
      display: flex; flex-direction: column; align-items: center; gap: 0.4rem;
      padding: 1rem 1.5rem;
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      min-width: 120px;
      transition: border-color 0.4s, box-shadow 0.4s;
    }
    .team-light .tl-emoji { font-size: 2rem; }
    .team-light .tl-name  { font-size: 0.85rem; font-weight: 600; }
    .team-light .tl-badge { font-size: 0.75rem; }
    .team-light.submitted {
      border-color: var(--green);
      box-shadow: 0 0 18px rgba(78,204,163,0.4);
    }

    /* ── Event Fullscreen Overlay ── */
    #eventOverlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.85);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      animation: fadeIn 0.3s ease;
    }
    #eventOverlay.hidden { display: none; }
    .event-big-icon  { font-size: 6rem; margin-bottom: 1rem; }
    .event-big-title { font-size: 2.5rem; font-weight: 900; color: var(--red); margin-bottom: 0.5rem; }
    .event-big-desc  { font-size: 1.4rem; color: var(--text); }

    /* ── Clearing / Slot Screen ── */
    #screenClearing {
      background: radial-gradient(ellipse at center, #0f0f2e 0%, var(--bg-dark) 70%);
    }

    .slot-stage { text-align: center; width: 100%; max-width: 800px; }

    .slot-row {
      display: flex; align-items: flex-end; justify-content: center;
      gap: 2rem; margin: 1.5rem 0;
    }

    .slot-item {
      display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
    }

    .slot-box {
      background: var(--bg-input);
      border: 3px solid var(--gold);
      border-radius: var(--radius);
      padding: 1rem 2rem;
      font-size: 4rem; font-weight: 900;
      color: var(--gold);
      min-width: 180px; text-align: center;
      box-shadow: 0 0 20px rgba(245,197,24,0.2);
    }

    .slot-box.revealed {
      animation: slotSpin 0.7s ease-out;
    }

    .slot-box-label {
      font-size: 0.85rem; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.08em;
    }

    .arrow-sep { font-size: 3rem; color: var(--accent); padding-bottom: 1.5rem; }

    .market-status-badge {
      display: inline-block;
      padding: 0.5rem 1.5rem;
      border-radius: 999px;
      font-size: 1.2rem; font-weight: 700;
      margin-top: 0.5rem;
    }
    .status-shortage { background: rgba(83,168,245,0.25); color: var(--blue); border: 2px solid var(--blue); }
    .status-equilibrium { background: rgba(78,204,163,0.25); color: var(--green); border: 2px solid var(--green); }
    .status-surplus    { background: rgba(255,140,66,0.25);  color: var(--orange); border: 2px solid var(--orange); }
    .status-crash      { background: rgba(231,76,60,0.25);   color: var(--red); border: 2px solid var(--red); }

    /* ── Leaderboard Screen ── */
    #screenLeaderboard {
      background: radial-gradient(ellipse at top, #1e1a3a 0%, var(--bg-dark) 60%);
    }

    .lb-title {
      font-size: 2.5rem; font-weight: 900;
      margin-bottom: 1.5rem;
      text-shadow: 0 0 20px rgba(245,197,24,0.4);
    }

    .lb-list { width: 100%; max-width: 700px; }

    .lb-list.two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 1.5rem;
    }

    .lb-row {
      display: flex; align-items: center; gap: 1rem;
      padding: 1rem 1.5rem;
      background: var(--bg-card);
      border-radius: var(--radius);
      margin-bottom: 0.75rem;
      border-left: 5px solid transparent;
      animation: slideUp 0.4s ease-out;
    }
    .lb-row:nth-child(1) { border-color: gold;   font-size: 1.1rem; }
    .lb-row:nth-child(2) { border-color: silver; }
    .lb-row:nth-child(3) { border-color: #cd7f32; }

    .lb-rank  { font-size: 1.8rem; font-weight: 900; width: 2.5rem; text-align: center; }
    .lb-name  { font-weight: 700; flex: 1; font-size: 1.1rem; }
    .lb-cap   { font-size: 1.3rem; font-weight: 900; color: var(--gold); }
    .lb-delta { font-size: 0.9rem; font-weight: 600; margin-left: 0.5rem; }
    .delta-pos { color: var(--green); }
    .delta-neg { color: var(--red); }

    @keyframes slotSpin {
      0%   { transform: translateY(-60px); opacity: 0; }
      60%  { transform: translateY(8px);   opacity: 1; }
      80%  { transform: translateY(-4px); }
      100% { transform: translateY(0); }
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════
     JOIN SCREEN
══════════════════════════════════════ -->
<div id="joinScreen">
  <div style="font-size:4rem; margin-bottom:1rem;">📺</div>
  <h1 style="font-size:2rem; font-weight:900; margin-bottom:0.5rem;">公開大屏幕</h1>
  <p class="text-dim mb-3">輸入課堂代碼以連接投影畫面</p>
  <div style="width:280px;" class="flex flex-col gap-2">
    <input type="text" id="inputCode" maxlength="4" placeholder="課堂代碼"
           style="text-align:center; font-size:2rem; font-weight:900; letter-spacing:0.3em;">
    <button class="btn btn-primary btn-lg" onclick="connectDisplay()">連接 →</button>
    <p id="connectError" class="text-red text-center hidden"></p>
  </div>
</div>

<!-- ══════════════════════════════════════
     SCREEN A — In Progress (Decision Phase)
══════════════════════════════════════ -->
<div id="screenProgress" class="screen hidden">

  <div class="progress-top">
    <div class="game-title">🧋 <span style="color:var(--gold);">奶茶大亨</span></div>
    <div id="progRoundLabel" style="font-weight:700;">回合 1 / 6</div>
    <div id="progCode" class="text-dim" style="font-size:0.9rem;"></div>
  </div>

  <!-- Giant Timer -->
  <div class="big-round-label mt-3">⏱ 決策倒數</div>
  <div id="progTimer" class="timer-giant">2:00</div>

  <!-- Demand Schedule Table (Mode 2) -->
  <div id="demandSchedule" style="margin-top:0.8rem; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:var(--radius); padding:0.8rem 1.2rem; max-width:520px;">
    <div style="font-size:0.9rem; color:var(--text-dim); margin-bottom:0.5rem; text-align:center;">📈 市場需求階梯（<span id="demandNLabel">—</span> 組）</div>
    <table style="width:100%; border-collapse:collapse; font-size:1rem; text-align:center;">
      <thead>
        <tr style="color:var(--text-dim); font-size:0.8rem; text-transform:uppercase; letter-spacing:0.05em;">
          <th style="padding:0.3rem 0.6rem; border-bottom:1px solid var(--border);">全班總產量 Q</th>
          <th style="padding:0.3rem 0.6rem; border-bottom:1px solid var(--border);">市場價格</th>
          <th style="padding:0.3rem 0.6rem; border-bottom:1px solid var(--border);">狀態</th>
        </tr>
      </thead>
      <tbody id="demandScheduleBody"></tbody>
    </table>
  </div>

  <!-- Fixed Price Display (Mode 1) -->
  <div id="fixedPriceSchedule" class="hidden" style="margin-top:0.8rem; background:rgba(245,197,24,0.08); border:2px solid rgba(245,197,24,0.4); border-radius:var(--radius); padding:1.2rem 2rem; text-align:center; max-width:520px;">
    <div style="font-size:0.9rem; color:var(--text-dim);">📊 本回合教師設定市價 (Price Taker)</div>
    <div id="displayFixedPrice" style="font-size:4rem; font-weight:900; color:var(--gold); margin:0.3rem 0;">$20</div>
    <div style="font-size:0.8rem; color:var(--text-dim);">所有小組面對相同的固定價格</div>
  </div>

  <!-- Inline Event Display (replaces overlay) -->
  <div id="inlineEventArea" class="hidden" style="margin-top:0.8rem; max-width:520px; width:100%;">
  </div>

  <!-- Team Lights -->
  <div class="team-lights" id="teamLights"></div>

</div>

<!-- Event overlay removed — events shown inline -->

<!-- ══════════════════════════════════════
     SCREEN B — Clearing (Slot Machine)
══════════════════════════════════════ -->
<div id="screenClearing" class="screen hidden">
  <div class="slot-stage">
    <h2 style="font-size:2rem; font-weight:900; margin-bottom:0.5rem;">⚙️ 回合結算</h2>
    <p class="text-dim mb-2">全班總產量正在計算中…</p>

    <div class="slot-row">
      <!-- Total Supply Slot -->
      <div class="slot-item">
        <div class="slot-box" id="slotSupply">?</div>
        <div class="slot-box-label">全班總產量 (Total TP)</div>
      </div>

      <div class="arrow-sep">→</div>

      <!-- Market Price Slot -->
      <div class="slot-item">
        <div class="slot-box" id="slotPrice">?</div>
        <div class="slot-box-label">最終市場價格 (Market Price)</div>
        <div id="slotStatusBadge"></div>
      </div>
    </div>

    <!-- Leaderboard auto-shown when teacher clicks 公佈結算結果 -->
  </div>
</div>

<!-- ══════════════════════════════════════
     SCREEN C — Leaderboard
══════════════════════════════════════ -->
<div id="screenLeaderboard" class="screen screen-scroll hidden">
  <div class="lb-title">🏆 <span style="color:var(--gold);">排行榜</span></div>
  <p id="lbRoundLabel" class="text-dim mb-2">回合 1 結算後</p>
  <div class="lb-list" id="lbList"></div>
  <p class="text-dim mt-3" style="font-size:0.8rem;">等待教師開始下一回合…</p>
</div>

<!-- ══════════════════════════════════════
     SCREEN D — All Rounds Data Panel (mirrored from teacher)
══════════════════════════════════════ -->
<div id="screenDataPanel" class="screen hidden" style="align-items:flex-start; justify-content:flex-start; padding-top:1.5rem; overflow-y:auto;">
  <div style="width:100%; max-width:900px; margin:0 auto;">
    <h2 style="font-size:2rem; font-weight:900; text-align:center; margin-bottom:1rem;">📊 <span style="color:var(--gold);">回合數據總覽</span></h2>
    <div id="displayDataContent" style="background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:1.5rem;"></div>
  </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/game-engine.js"></script>

<script>
// ── State ──
let sessionId    = null;
let gameMode     = 1;
let numberOfGroups = 5;
let currentRound = 1;
let lastStatus   = null;
let lastEvents   = [];
let timerInterval = null;
let prevCapitals  = {};   // teamId → capital before this round (for delta display)
let lastDataPanelVisible = false;
let lastDataPanelTeam = null;
let teamNameCache = {}; // teamId → { name, emoji }

/** Get display name/emoji for a team, preferring Firestore cache over GameEngine */
function getTeamDisplay(teamId) {
  if (teamNameCache[teamId]) return teamNameCache[teamId];
  const ge = GameEngine.ALL_TEAMS.find(t => t.id === teamId);
  return ge ? { name: ge.name, emoji: ge.emoji } : { name: teamId, emoji: '🟤' };
}

// ── Connect ──
async function connectDisplay() {
  const code = document.getElementById('inputCode').value.trim();
  if (!code || code.length !== 4) { return showError('請輸入 4 位數課堂代碼'); }

  const snap = await db.collection('game_sessions').doc(code).get();
  if (!snap.exists) { return showError('找不到該課堂代碼'); }

  sessionId = code;
  const sessionData = snap.data();
  numberOfGroups = sessionData.number_of_groups || 0;
  gameMode = sessionData.game_mode || 1;
  document.getElementById('progCode').textContent = '課堂: ' + code;
  document.getElementById('joinScreen').style.display = 'none';

  // Mode-aware demand/price display
  if (gameMode === 1) {
    document.getElementById('demandSchedule').classList.add('hidden');
    document.getElementById('fixedPriceSchedule').classList.remove('hidden');
    const fp = sessionData.fixed_market_price || 20;
    document.getElementById('displayFixedPrice').textContent = '$' + fp;
  } else {
    document.getElementById('demandSchedule').classList.remove('hidden');
    document.getElementById('fixedPriceSchedule').classList.add('hidden');
    document.getElementById('demandNLabel').textContent = numberOfGroups;
    const demandTable = GameEngine.getDemandTable(numberOfGroups, 2);
    const statusIcons = ['📈', '⚖️', '📉', '💀'];
    const tierColors = ['var(--blue)', 'var(--green)', 'var(--orange)', 'var(--red)'];
    document.getElementById('demandScheduleBody').innerHTML = demandTable.map((t, i) =>
      `<tr>
        <td style="padding:0.4rem 0.6rem; border-bottom:1px solid rgba(255,255,255,0.06);">${t.range}</td>
        <td style="padding:0.4rem 0.6rem; border-bottom:1px solid rgba(255,255,255,0.06); font-weight:900; color:var(--gold); font-size:1.1rem;">$${t.price}</td>
        <td style="padding:0.4rem 0.6rem; border-bottom:1px solid rgba(255,255,255,0.06); color:${tierColors[i]};">${statusIcons[i]} ${t.desc}</td>
      </tr>`
    ).join('');
  }

  // Snapshot current capitals for delta and populate team name cache
  const teamsSnap = await db.collection('game_sessions').doc(code).collection('teams').get();
  teamsSnap.forEach(doc => {
    const t = doc.data();
    prevCapitals[doc.id] = t.total_capital || 200;
    teamNameCache[doc.id] = { name: t.name || t.custom_name || doc.id, emoji: t.emoji || '🟤' };
  });

  renderTeamLights();
  subscribeSession();
  subscribeDecisions();

  // Live-listen for new teams joining (updates team lights + cache)
  db.collection('game_sessions').doc(code).collection('teams').onSnapshot(snap => {
    snap.forEach(doc => {
      const t = doc.data();
      teamNameCache[doc.id] = { name: t.name || t.custom_name || doc.id, emoji: t.emoji || '🟤' };
      prevCapitals[doc.id] = t.total_capital || 200;
    });
    if (snap.size > 0 && snap.size !== numberOfGroups) {
      numberOfGroups = snap.size;
      renderTeamLights();
    }
  });
}

function showError(msg) {
  const el = document.getElementById('connectError');
  el.textContent = msg;
  el.classList.remove('hidden');
}

// ── Session Listener ──
function subscribeSession() {
  db.collection('game_sessions').doc(sessionId).onSnapshot(snap => {
    if (!snap.exists) return;
    const s = snap.data();
    currentRound = s.current_round || 1;
    if (s.number_of_groups) numberOfGroups = s.number_of_groups;

    document.getElementById('progRoundLabel').textContent = `回合 ${currentRound} / ${GameEngine.MAX_ROUNDS}`;

    // Update fixed price for Mode 1
    if (gameMode === 1 && s.fixed_market_price) {
      document.getElementById('displayFixedPrice').textContent = '$' + s.fixed_market_price;
    }

    // Detect new events
    const newEvents = s.active_events || [];
    if (newEvents.length > lastEvents.length) {
      const newest = newEvents[newEvents.length - 1];
      showEventOverlay(newest);
    }
    lastEvents = newEvents;
    // Always update inline events
    updateInlineEvents();

    // Data Panel: teacher-controlled data view
    if (s.data_panel_visible && s.data_panel_team) {
      // Only reload if team selection actually changed
      if (s.data_panel_team !== lastDataPanelTeam || !lastDataPanelVisible) {
        loadAndShowDataPanel(s.data_panel_team);
      }
      return; // Data panel takes priority
    } else if (lastDataPanelVisible && !s.data_panel_visible) {
      // Teacher closed the data panel, return to appropriate screen
      lastDataPanelVisible = false;
      if (s.status === 'results') {
        revealLeaderboard();
      } else {
        showScreen('screenProgress');
      }
    }
    lastDataPanelVisible = s.data_panel_visible || false;

    // Status transitions
    if (s.status !== lastStatus) {
      lastStatus = s.status;
      handleStatusChange(s);
    }
  });
}

// ── Decision Listener (real-time team lights) ──
function subscribeDecisions() {
  db.collection('game_sessions').doc(sessionId)
    .collection('decisions')
    .onSnapshot(snap => {
      const submitted = new Set();
      snap.forEach(doc => {
        const d = doc.data();
        if (d.round_number === currentRound) submitted.add(d.team_id);
      });
      updateTeamLights(submitted);
    });
}

// ── Status Machine ──
function handleStatusChange(session) {
  switch (session.status) {
    case 'waiting':
      showScreen('screenProgress');
      resetTimer();
      break;

    case 'in_progress':
      showScreen('screenProgress');
      startTimer(session.timer_end);
      break;

    case 'clearing':
      clearInterval(timerInterval);
      showScreen('screenClearing');
      // Reset slots
      document.getElementById('slotSupply').textContent = '?';
      document.getElementById('slotPrice').textContent  = '?';
      document.getElementById('slotStatusBadge').innerHTML = '';
      // Animate after short delay
      setTimeout(() => runSlotAnimation(session), 1200);
      break;

    case 'results':
      // Auto-show leaderboard when teacher publishes results
      revealLeaderboard();
      break;
  }
}

// ── Slot Machine Animation ──
async function runSlotAnimation(session) {
  // Gather clearing data
  const clearing = session.last_clearing;
  if (!clearing) return;

  const totalSupply  = clearing.total_supply;
  const marketPrice  = clearing.market_price;
  const marketDesc   = clearing.market_description || '';

  // Phase 1: Spin total supply
  await spinSlot('slotSupply', totalSupply, 1800);

  // Short pause then spin price
  await sleep(600);
  await spinSlot('slotPrice', '$' + marketPrice, 1600);

  // Show status badge
  const badge = document.getElementById('slotStatusBadge');
  badge.innerHTML = `<span class="market-status-badge ${getStatusClass(marketDesc)}">${marketDesc}</span>`;

  // Auto-show leaderboard after slot animation (wait for teacher to click 公佈結算結果)
  await sleep(800);
}

function spinSlot(id, finalValue, duration) {
  return new Promise(resolve => {
    const el = document.getElementById(id);
    const chars = '0123456789';
    const totalFrames = Math.floor(duration / 80);
    let frame = 0;

    const interval = setInterval(() => {
      frame++;
      if (frame >= totalFrames) {
        clearInterval(interval);
        el.textContent = finalValue;
        el.classList.add('revealed');
        setTimeout(() => el.classList.remove('revealed'), 800);
        resolve();
      } else {
        // Show scrambled number during spin
        const progress = frame / totalFrames;
        if (progress < 0.7) {
          const rand = Math.floor(Math.random() * 999);
          el.textContent = String(finalValue).startsWith('$')
            ? '$' + rand
            : rand;
        } else {
          el.textContent = finalValue;
        }
      }
    }, 80);
  });
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function getStatusClass(desc) {
  if (desc.includes('短缺')) return 'status-shortage';
  if (desc.includes('均衡')) return 'status-equilibrium';
  if (desc.includes('過剩')) return 'status-surplus';
  return 'status-crash';
}

// ── Leaderboard ──
async function revealLeaderboard() {
  showScreen('screenLeaderboard');
  document.getElementById('lbRoundLabel').textContent = `回合 ${currentRound} 結算後`;

  const snap = await db.collection('game_sessions').doc(sessionId)
    .collection('teams').orderBy('total_capital', 'desc').get();

  const medals = ['🥇', '🥈', '🥉'];
  let rank = 0;
  let html = '';

  // Get this round's results for delta
  const resultsSnap = await db.collection('game_sessions').doc(sessionId)
    .collection('round_results')
    .where('round_number', '==', currentRound).get();

  const roundProfits = {};
  resultsSnap.forEach(doc => {
    const r = doc.data();
    roundProfits[r.team_id] = r.profit || 0;
  });

  snap.forEach(doc => {
    const t = doc.data();
    const cap = t.total_capital || 0;
    const profit = roundProfits[t.team_id] || 0;
    const deltaClass = profit >= 0 ? 'delta-pos' : 'delta-neg';
    const deltaSign  = profit >= 0 ? '+' : '';

    html += `<div class="lb-row" style="animation-delay:${rank * 0.12}s;">
      <div class="lb-rank">${medals[rank] || rank + 1}</div>
      <div class="lb-name">${t.emoji} ${t.name}</div>
      <div class="lb-cap">$${cap.toLocaleString()}</div>
      <div class="lb-delta ${deltaClass}">${deltaSign}$${profit.toLocaleString()}</div>
    </div>`;

    // Update prevCapitals for next round delta
    prevCapitals[t.team_id] = cap;
    rank++;
  });

  const lbList = document.getElementById('lbList');
  lbList.innerHTML = html;
  // 2-column layout when more than 6 teams
  lbList.classList.toggle('two-col', numberOfGroups > 6);
}

// ── Timer ──
function startTimer(timerEndTimestamp) {
  clearInterval(timerInterval);
  const el = document.getElementById('progTimer');

  // Resolve end time once, before the interval starts
  let endMs = Date.now() + 120 * 1000; // fallback
  if (timerEndTimestamp) {
    if (typeof timerEndTimestamp.toDate === 'function') {
      endMs = timerEndTimestamp.toDate().getTime();
    } else if (timerEndTimestamp.seconds) {
      endMs = timerEndTimestamp.seconds * 1000;
    } else if (typeof timerEndTimestamp === 'number') {
      endMs = timerEndTimestamp;
    }
  }

  timerInterval = setInterval(() => {
    const secsLeft = Math.max(0, Math.round((endMs - Date.now()) / 1000));
    const min = Math.floor(secsLeft / 60);
    const sec = secsLeft % 60;
    el.textContent = `${min}:${String(sec).padStart(2, '0')}`;
    el.classList.toggle('timer-urgent', secsLeft <= 30);
    if (secsLeft <= 0) clearInterval(timerInterval);
  }, 500);
}

function resetTimer() {
  clearInterval(timerInterval);
  document.getElementById('progTimer').textContent = '2:00';
  document.getElementById('progTimer').classList.remove('timer-urgent');
}

// ── Team Lights ──
function renderTeamLights() {
  const teams = GameEngine.getTeams(numberOfGroups);
  const container = document.getElementById('teamLights');
  container.innerHTML = teams.map(t => {
    const td = getTeamDisplay(t.id);
    return `<div class="team-light" id="light_${t.id}">
      <div class="tl-emoji">${td.emoji}</div>
      <div class="tl-name">${td.name}</div>
      <div class="tl-badge"><span class="badge badge-waiting" id="lightBadge_${t.id}">⏳ 思考中</span></div>
    </div>`;
  }).join('');
}

function updateTeamLights(submittedSet) {
  const teams = GameEngine.getTeams(numberOfGroups);
  for (const team of teams) {
    const card  = document.getElementById('light_' + team.id);
    const badge = document.getElementById('lightBadge_' + team.id);
    if (!card || !badge) continue;
    if (submittedSet.has(team.id)) {
      card.classList.add('submitted');
      badge.className  = 'badge badge-submitted';
      badge.textContent = '✅ 已鎖定';
    } else {
      card.classList.remove('submitted');
      badge.className  = 'badge badge-thinking';
      badge.textContent = '🤔 思考中';
    }
  }
}

// ── Inline Event Display (no overlay) ──
function showEventOverlay(evt) {
  // Show events inline below price, no overlay
  updateInlineEvents();
}

function updateInlineEvents() {
  const area = document.getElementById('inlineEventArea');
  if (!area) return;
  if (!lastEvents || lastEvents.length === 0) {
    area.classList.add('hidden');
    return;
  }
  area.classList.remove('hidden');
  area.innerHTML = lastEvents.map(evt => {
    const displayName = evt.name.replace(/\s*\(陷阱卡\)/, '');
    return `<div style="background:rgba(231,76,60,0.12); border:1.5px solid rgba(231,76,60,0.4); border-radius:var(--radius-sm); padding:0.6rem 1rem; margin-bottom:0.4rem; display:flex; align-items:center; gap:0.6rem; font-size:1.1rem;">
      <span style="font-size:1.6rem;">${evt.icon || '⚡'}</span>
      <span><strong style="color:var(--red);">${displayName}</strong>　${evt.desc}</span>
    </div>`;
  }).join('');
}

// ── Data Panel (mirrored from teacher) ──
let _dataPanelToken = 0;
async function loadAndShowDataPanel(teamId) {
  lastDataPanelVisible = true;
  lastDataPanelTeam = teamId;
  const myToken = ++_dataPanelToken;

  const content = document.getElementById('displayDataContent');

  try {
    // Load all round_results (no composite index needed)
    const snap = await db.collection('game_sessions').doc(sessionId)
      .collection('round_results').get();

    // Build cache for all teams
    const allCache = {};
    snap.forEach(doc => {
      const r = doc.data();
      if (!allCache[r.team_id]) allCache[r.team_id] = [];
      allCache[r.team_id].push(r);
    });
    for (const tid in allCache) {
      allCache[tid].sort((a, b) => (a.round_number || 0) - (b.round_number || 0));
    }

    // Bail out if a newer call has already started
    if (myToken !== _dataPanelToken) return;

    if (teamId === 'overall') {
      renderDisplayOverallSummary(content, allCache);
      showScreen('screenDataPanel');
      return;
    }

    const team = getTeamDisplay(teamId);
    const rounds = allCache[teamId] || [];

    if (!team || rounds.length === 0) {
      content.innerHTML = `<p class="text-dim text-center" style="padding:2rem; font-size:1.2rem;">此組別尚無回合數據</p>`;
      showScreen('screenDataPanel');
      return;
    }

  let cumCapital = 200;
  let optimalCount = 0;
  const roundRows = rounds.map(r => {
    const fc = r.effective_fc !== undefined ? r.effective_fc : GameEngine.DEFAULT_FC;
    const vc = r.vc !== undefined ? r.vc : (r.tc - fc);
    cumCapital += r.profit;
    const { optimalQ } = GameEngine.getOptimalQ(r.market_price, fc, r.q, vc);
    const isOptimal = (r.q === optimalQ);
    if (isOptimal) optimalCount++;
    return {
      round: r.round_number, price: r.market_price, q: r.q,
      fc, vc, tc: r.tc, tr: r.tr, profit: r.profit, mc: r.mc,
      overproduction: r.overproduction, belowShutdown: r.below_shutdown,
      cumCapital, optimalQ, isOptimal
    };
  });

  const score = Math.round((optimalCount / roundRows.length) * 100);
  const scoreColor = score >= 80 ? '#4ecca3' : score >= 50 ? '#f5c518' : '#e74c3c';
  const scoreLabel = score >= 80 ? '🔥 營商之鬼' : score >= 50 ? '📈 穩步上揚' : '⚠️ 仍需努力';

  let html = `
    <div style="display:flex; align-items:center; justify-content:center; gap:1.5rem; flex-wrap:wrap; margin-bottom:1rem;">
      <div style="text-align:center;">
        <div style="font-size:2rem; font-weight:900;">${team.emoji} ${team.name}</div>
        <div style="margin-top:0.3rem;">
          <span class="text-dim" style="font-size:1rem;">累積資金：</span>
          <span style="font-size:1.5rem; font-weight:900; color:var(--gold);">$${roundRows[roundRows.length-1].cumCapital}</span>
        </div>
      </div>
      <div style="background:rgba(0,0,0,0.3); border:3px solid ${scoreColor}; border-radius:var(--radius); padding:0.8rem 1.5rem; text-align:center; min-width:180px; box-shadow:0 0 20px ${scoreColor}44;">
        <div style="font-size:0.78rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.08em;">營商之鬼指數</div>
        <div style="font-size:2.8rem; font-weight:900; color:${scoreColor}; line-height:1.1;">${score}%</div>
        <div style="font-size:0.9rem; font-weight:700; color:${scoreColor};">${scoreLabel}</div>
        <div style="font-size:0.75rem; color:var(--text-dim); margin-top:0.15rem;">利潤極大化達標 ${optimalCount}/${roundRows.length} 回合</div>
      </div>
    </div>
    <table class="data-table" style="width:100%; font-size:1rem;">
      <thead>
        <tr>
          <th>回合</th><th>市價</th><th>產量Q</th><th>最佳Q*</th><th>租金FC</th><th>工資VC</th>
          <th>總成本TC</th><th>營業額TR</th><th>MC</th><th>利潤</th><th>累積資金</th><th>備註</th>
        </tr>
      </thead>
      <tbody>`;

  for (const row of roundRows) {
    const profitColor = row.profit >= 0 ? 'var(--green)' : 'var(--red)';
    const profitSign = row.profit >= 0 ? '+' : '';
    const mcText = row.mc !== null && row.mc !== undefined ? '$' + row.mc : '—';
    let notes = [];
    if (row.isOptimal) {
      notes.push('<span style="color:#4ecca3;">✅ 利潤極大化</span>');
    } else if (row.q > row.optimalQ) {
      notes.push('<span style="color:#e74c3c;">🔴 過度生產</span>');
      notes.push(`<span style="color:var(--text-dim);font-size:0.8rem;">應減產至 Q=${row.optimalQ}</span>`);
    } else if (row.q < row.optimalQ && row.q > 0) {
      notes.push('<span style="color:#53a8f5;">🔵 產量不足</span>');
      notes.push(`<span style="color:var(--text-dim);font-size:0.8rem;">可增產至 Q=${row.optimalQ}</span>`);
    } else if (row.q === 0 && row.optimalQ > 0) {
      notes.push('<span style="color:#ff8c42;">⚪ 未生產</span>');
      notes.push(`<span style="color:var(--text-dim);font-size:0.8rem;">最佳 Q=${row.optimalQ}</span>`);
    } else if (row.q === 0 && row.optimalQ === 0) {
      notes.push('<span style="color:#4ecca3;">✅ 正確停產</span>');
    }
    if (row.belowShutdown) notes.push('<span style="color:#e74c3c;">💀 跌穿停產點</span>');
    const optQStyle = row.isOptimal ? 'color:#4ecca3;font-weight:900;' : 'color:var(--text-dim);';
    html += `
        <tr>
          <td style="text-align:center; font-weight:700; font-size:1.1rem;">${row.round}</td>
          <td style="text-align:center; color:var(--gold); font-weight:700;">$${row.price}</td>
          <td style="text-align:center; font-weight:700;">${row.q}</td>
          <td style="text-align:center; ${optQStyle}">${row.optimalQ}</td>
          <td style="text-align:center;">$${row.fc}</td>
          <td style="text-align:center;">$${row.vc}</td>
          <td style="text-align:center;">$${row.tc}</td>
          <td style="text-align:center; color:var(--blue);">$${row.tr}</td>
          <td style="text-align:center;">${mcText}</td>
          <td style="text-align:center; font-weight:700; color:${profitColor};">${profitSign}$${row.profit}</td>
          <td style="text-align:center; font-weight:700; color:var(--gold);">$${row.cumCapital}</td>
          <td style="font-size:0.85rem; line-height:1.4;">${notes.join('<br>')}</td>
        </tr>`;
  }

  html += `</tbody></table>`;

  // Cost structure
  html += `
    <div style="margin-top:1.2rem; padding:0.8rem 1rem; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:var(--radius-sm);">
      <div style="font-weight:700; font-size:0.95rem; margin-bottom:0.5rem;">📋 成本結構參考表</div>
      <table class="data-table" style="width:100%; font-size:0.9rem;">
        <thead>
          <tr><th>Q</th><th>0</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th><th>7</th><th>8</th></tr>
        </thead>
        <tbody>
          <tr><td style="font-weight:600;">VC</td>${GameEngine.Q_TABLE.map(r => `<td style="text-align:center;">$${r.vc}</td>`).join('')}</tr>
          <tr><td style="font-weight:600;">MC</td>${GameEngine.Q_TABLE.map(r => `<td style="text-align:center;">${r.mc !== null ? '$'+r.mc : '—'}</td>`).join('')}</tr>
        </tbody>
      </table>
    </div>`;

  content.innerHTML = html;
  showScreen('screenDataPanel');

  } catch (err) {
    console.error('loadAndShowDataPanel error:', err);
    content.innerHTML = `<p style="color:var(--red); padding:1rem; font-size:1.2rem;">載入數據失敗：${err.message}</p>`;
    showScreen('screenDataPanel');
  }
}

function renderDisplayOverallSummary(content, allCache) {
  const teams = GameEngine.getTeams(numberOfGroups);
  if (Object.keys(allCache).length === 0) {
    content.innerHTML = `<p class="text-dim text-center" style="padding:2rem; font-size:1.4rem;">尚無回合數據</p>`;
    return;
  }
  const allRoundNums = new Set();
  for (const tid in allCache) {
    allCache[tid].forEach(r => allRoundNums.add(r.round_number));
  }
  const rounds = [...allRoundNums].sort((a, b) => a - b);

  let html = `<div style="font-size:1.6rem; font-weight:900; text-align:center; margin-bottom:1rem;">📋 所有小組各回合表現一覽</div>`;

  for (const roundNum of rounds) {
    html += `<div style="margin-bottom:1.4rem;">
      <div style="font-weight:700; font-size:1.1rem; margin-bottom:0.5rem; color:var(--gold);">第 ${roundNum} 回合</div>
      <table class="data-table" style="width:100%; font-size:0.95rem;">
        <thead><tr>
          <th>小組</th><th>市價</th><th>Q</th><th>Q*</th>
          <th>FC</th><th>VC</th><th>TC</th><th>TR</th><th>MC</th>
          <th>利潤</th><th>備註</th>
        </tr></thead><tbody>`;
    for (const t of teams) {
      const td = getTeamDisplay(t.id);
      const rData = (allCache[t.id] || []).find(r => r.round_number === roundNum);
      if (!rData) {
        html += `<tr><td>${td.emoji} ${td.name}</td><td colspan="10" style="text-align:center; color:var(--text-dim);">—</td></tr>`;
        continue;
      }
      const fc = rData.effective_fc !== undefined ? rData.effective_fc : GameEngine.DEFAULT_FC;
      const vc = rData.vc !== undefined ? rData.vc : (rData.tc - fc);
      const { optimalQ } = GameEngine.getOptimalQ(rData.market_price, fc, rData.q, vc);
      const isOptimal = (rData.q === optimalQ);
      const profitColor = rData.profit >= 0 ? 'var(--green)' : 'var(--red)';
      const profitSign = rData.profit >= 0 ? '+' : '';
      const mcText = rData.mc !== null && rData.mc !== undefined ? '$' + rData.mc : '—';
      let notes = [];
      if (isOptimal) notes.push('<span style="color:#4ecca3;">✅</span>');
      else if (rData.q > optimalQ) notes.push('<span style="color:#e74c3c;">🔴</span>');
      else if (rData.q < optimalQ && rData.q > 0) notes.push('<span style="color:#53a8f5;">🔵</span>');
      else if (rData.q === 0 && optimalQ > 0) notes.push('<span style="color:#ff8c42;">⚪</span>');
      else if (rData.q === 0 && optimalQ === 0) notes.push('<span style="color:#4ecca3;">✅</span>');
      if (rData.below_shutdown) notes.push('<span style="color:#e74c3c;">💀</span>');
      const optQStyle = isOptimal ? 'color:#4ecca3;font-weight:900;' : 'color:var(--text-dim);';
      html += `<tr>
        <td style="font-weight:700;">${td.emoji} ${td.name}</td>
        <td style="text-align:center; color:var(--gold);">$${rData.market_price}</td>
        <td style="text-align:center; font-weight:700;">${rData.q}</td>
        <td style="text-align:center; ${optQStyle}">${optimalQ}</td>
        <td style="text-align:center;">$${fc}</td>
        <td style="text-align:center;">$${vc}</td>
        <td style="text-align:center;">$${rData.tc}</td>
        <td style="text-align:center; color:var(--blue);">$${rData.tr}</td>
        <td style="text-align:center;">${mcText}</td>
        <td style="text-align:center; font-weight:700; color:${profitColor};">${profitSign}$${rData.profit}</td>
        <td style="font-size:0.85rem;">${notes.join(' ')}</td>
      </tr>`;
    }
    html += `</tbody></table></div>`;
  }

  // Ranking summary
  html += `<div style="margin-top:1rem; padding:1rem; background:rgba(245,197,24,0.06); border:1px solid rgba(245,197,24,0.2); border-radius:var(--radius-sm);">
    <div style="font-weight:700; font-size:1.1rem; margin-bottom:0.5rem; text-align:center;">🏆 營商之鬼指數排行</div>
    <table class="data-table" style="width:100%; font-size:1rem;">
      <thead><tr><th>排名</th><th>小組</th><th>達標回合</th><th>指數</th></tr></thead>
      <tbody>`;
  const rankings = teams.map(t => {
    const td = getTeamDisplay(t.id);
    const tRounds = allCache[t.id] || [];
    let optimal = 0;
    tRounds.forEach(r => {
      const fc = r.effective_fc !== undefined ? r.effective_fc : GameEngine.DEFAULT_FC;
      const vc = r.vc !== undefined ? r.vc : (r.tc - fc);
      const { optimalQ } = GameEngine.getOptimalQ(r.market_price, fc, r.q, vc);
      if (r.q === optimalQ) optimal++;
    });
    const score = tRounds.length > 0 ? Math.round((optimal / tRounds.length) * 100) : 0;
    return { ...td, optimal, total: tRounds.length, score };
  }).sort((a, b) => b.score - a.score);

  const medals = ['🥇', '🥈', '🥉'];
  rankings.forEach((r, i) => {
    const scoreColor = r.score >= 80 ? '#4ecca3' : r.score >= 50 ? '#f5c518' : '#e74c3c';
    html += `<tr>
      <td style="text-align:center; font-weight:700; font-size:1.2rem;">${medals[i] || (i + 1)}</td>
      <td style="font-weight:700; font-size:1.05rem;">${r.emoji} ${r.name}</td>
      <td style="text-align:center;">${r.optimal}/${r.total}</td>
      <td style="text-align:center; font-weight:900; font-size:1.1rem; color:${scoreColor};">${r.score}%</td>
    </tr>`;
  });
  html += `</tbody></table></div>`;

  content.innerHTML = html;
}

// ── Screen Switcher ──
function showScreen(id) {
  ['screenProgress', 'screenClearing', 'screenLeaderboard', 'screenDataPanel'].forEach(s => {
    document.getElementById(s).classList.add('hidden');
  });
  document.getElementById(id).classList.remove('hidden');
}
